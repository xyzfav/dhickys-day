<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Chronicle</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#d9d9d9;
  font-family:Georgia, serif;
}

.newspaper{
  width:100%;
  min-height:100vh;
  background:#f5f0e5;
  max-width:900px;
  margin:auto;
  padding:25px;
  color:#222;
}

.top-info{
  text-align:center;
  font-size:14px;
  letter-spacing:4px;
  margin-bottom:20px;
}

.title{
  text-align:center;
  font-size:58px;
  font-weight:bold;
  margin-bottom:10px;
}

.edition{
  text-align:center;
  letter-spacing:8px;
  font-size:20px;
  margin-bottom:30px;
}

hr{
  border:none;
  border-top:2px solid #222;
  margin-bottom:30px;
}

.headline{
  text-align:center;
  font-size:50px;
  margin-bottom:10px;
}

.subheadline{
  text-align:center;
  font-size:30px;
  margin-bottom:35px;
}

.cover{
  width:100%;
  border:10px solid white;
  box-shadow:0 8px 30px rgba(0,0,0,.15);
}

.article{
  margin-top:35px;
  font-size:24px;
  line-height:1.8;
  text-align:center;
}

.button-area{
  text-align:center;
  margin-top:50px;
}

button{
  border:none;
  background:#1f1f1f;
  color:white;
  padding:18px 40px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.footer{
  margin-top:50px;
  text-align:center;
  font-size:18px;
  color:#555;
}

@media(max-width:600px){

  .newspaper{
    padding:20px;
  }

  .title{
    font-size:42px;
  }

  .edition{
    font-size:15px;
    letter-spacing:4px;
  }

  .headline{
    font-size:34px;
  }

  .subheadline{
    font-size:22px;
  }

  .article{
    font-size:20px;
  }
}
</style>
</head>

<body>

<div class="newspaper">

  <div class="top-info">
    SPECIAL BIRTHDAY EDITION• 31 JULY 2026
  </div>

  <div class="title">
    THE CELEBRATION POST
  </div>

  <div class="edition">
    SPECIAL EDITION
  </div>

  <hr>

  <div class="headline">
    THE MAN OF THE DAY
  </div>

  <div class="subheadline">
    DHICKY MY BELOVED BOYFRIEND
  </div>

  <img src="cover.jpg" class="cover">

  <div class="article">
    Today we celebrate someone special.
    Another year older, another chapter,
    and another reason to smile.
  </div>

  <div class="button-area">
    <button onclick="nextPage()">
      📰 Read Today's Story
    </button>
  </div>

  <div class="footer">
    This special edition is lovingly dedicated to Dhicky 🖤
  </div>

</div>

<script>
function nextPage(){
  alert("Nanti kita sambungkan ke halaman artikel dan amplop 💌");
}
</script>

</body>
</html>
