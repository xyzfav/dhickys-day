<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Dhicky 🖤</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#e9dfcb;
font-family:'Cormorant Garamond',serif;
}


.page{
position:fixed;
inset:0;
display:none;
overflow:auto;
}

.active{
display:flex;
}


#countdown{
background:#111;
color:#f3e8d2;
justify-content:center;
align-items:center;
font-family:'Cinzel',serif;
font-size:130px;
letter-spacing:20px;
}


#newspaper{
background:#ece3d0;
justify-content:center;
align-items:flex-start;
padding:30px;
}

.paper{
background:#f5ecda;
width:100%;
max-width:900px;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
border:2px solid #d5c5a7;
}

.date{
text-align:center;
letter-spacing:4px;
font-size:15px;
}

.title{
text-align:center;
font-size:70px;
font-weight:700;
font-family:'Cinzel',serif;
margin-top:20px;
}

.line{
height:2px;
background:#111;
margin:25px 0;
}

.headline{
text-align:center;
font-size:55px;
font-weight:700;
}

.sub{
text-align:center;
font-size:28px;
margin-top:15px;
}

.cover{
width:100%;
margin-top:35px;
border:10px solid white;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.text{
font-size:28px;
text-align:center;
line-height:1.7;
margin-top:35px;
}

.btn{
display:block;
margin:45px auto 0;
padding:18px 40px;
border:none;
background:#111;
color:white;
border-radius:50px;
font-size:18px;
cursor:pointer;
}


@media(max-width:600px){

#countdown{
font-size:90px;
}

.title{
font-size:45px;
}

.headline{
font-size:35px;
}

.sub{
font-size:20px;
}

.text{
font-size:22px;
}

}
</style>
</head>

<body>


<div id="countdown" class="page active">
3
</div>


<div id="newspaper" class="page">

<div class="paper">

<div class="date">
SPECIAL BIRTHDAY EDITION • 31 JULY 2026
</div>

<div class="title">
THE CELEBRATION POST
</div>

<div class="line"></div>

<div class="headline">
THE MAN OF THE DAY
</div>

<div class="sub">
DHICKY, MY BELOVED BOYFRIEND
</div>

<img src="cover.jpg" class="cover">

<div class="text">
Today we celebrate someone special.
Another year older, another chapter,
and another reason to smile. 🖤
</div>

<button class="btn" onclick="openEnvelope()">
Continue Reading
</button>

</div>

</div>

<script>

let n = 3;
const countdown =
document.getElementById("countdown");

const timer =
setInterval(()=>{

n--;

if(n>0){
countdown.innerHTML=n;
}
else{

clearInterval(timer);

countdown.innerHTML="✦";

setTimeout(()=>{

countdown.style.display="none";

document
.getElementById("newspaper")
.classList.add("active");

},1000);

}

},1000);

function openEnvelope(){
alert("Nanti kita sambungkan ke amplop vintage 💌");
}

</script>

</body>
</html>
