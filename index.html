<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Edition For Dhicky 🖤</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#1a1a1a;
  font-family:'Quicksand',sans-serif;
  overflow:hidden;
}


#countdown{
  position:fixed;
  inset:0;
  background:#111;
  color:#f3e6cf;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:90px;
  z-index:999;
  transition:1s;
}


#coverPage,
#newsPage,
#envelopePage{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:#1a1a1a;
  padding:30px;
}

.paper{
  width:90%;
  max-width:700px;
  background:#f3e6cf;
  color:#2f2f2f;
  padding:40px 30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 15px 35px rgba(0,0,0,.4);
}

.paper h1{
  font-family:'Cinzel',serif;
  font-size:38px;
  margin-bottom:15px;
}

.paper h2{
  font-size:22px;
  margin-bottom:25px;
  letter-spacing:3px;
}

.paper p{
  line-height:1.8;
  margin-bottom:30px;
}

button{
  padding:15px 35px;
  border:none;
  border-radius:50px;
  background:#2f2f2f;
  color:#f3e6cf;
  cursor:pointer;
  font-size:16px;
}


.envelope{
  width:320px;
  height:220px;
  position:relative;
  cursor:pointer;
}

.envelope-body{
  width:100%;
  height:100%;
  background:#2a2a2a;
  border:2px solid #6b5644;
  border-radius:15px;
}

.envelope-flap{
  position:absolute;
  top:0;
  width:100%;
  height:110px;
  background:#3a3a3a;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1s;
}

.seal{
  position:absolute;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#6b5644;
  color:#f3e6cf;
  display:flex;
  justify-content:center;
  align-items:center;
  left:50%;
  top:48%;
  transform:translate(-50%,-50%);
  z-index:5;
  font-weight:bold;
}

.letter{
  position:absolute;
  width:260px;
  height:170px;
  background:#f3e6cf;
  left:30px;
  top:40px;
  border-radius:10px;
  padding:20px;
  color:#333;
  transform:translateY(80px);
  transition:1s;
  opacity:0;
}

.envelope.open .letter{
  transform:translateY(-80px);
  opacity:1;
}

.envelope.open .envelope-flap{
  transform:rotateX(180deg);
}

.envelope.open .seal{
  opacity:0;
}

@media(max-width:600px){

  #countdown{
    font-size:70px;
  }

  .paper h1{
    font-size:30px;
  }

  .envelope{
    width:280px;
    height:200px;
  }

  .letter{
    width:230px;
    left:25px;
  }
}
</style>
</head>

<body>

<div id="countdown">⚽⚽⚽</div>


<div id="coverPage">

  <div class="paper">

    <h1>THE DAILY CHRONICLE</h1>

    <h2>SPECIAL EDITION</h2>

    <p>
      31 JULY 2026
      <br><br>
      FOR DHICKY 🖤
    </p>

    <button id="readBtn">
      📰 Read Today's Story
    </button>

  </div>

</div>
  
<div id="newsPage">

  <div class="paper">

    <h1>BREAKING NEWS</h1>

    <p>
      A Very Special Person
      Turns One Year Older Today.
      <br><br>
      A little universe was created
      especially for you. ✨
    </p>

    <button id="openBtn">
      💌 Open The Secret Letter
    </button>

  </div>

</div>

<div id="envelopePage">

  <div class="envelope" id="envelope">

    <div class="envelope-flap"></div>

    <div class="envelope-body"></div>

    <div class="seal">D</div>

    <div class="letter">
      <h3>Dear Dhicky 🖤</h3>
      <br>
      Your letter will be here...
    </div>

  </div>

</div>

<script>
const balls = ["⚽⚽⚽","⚽⚽","⚽","✨"];

let i = 0;

const countdown =
document.getElementById("countdown");

const timer = setInterval(()=>{

  i++;

  if(i < balls.length){
    countdown.innerHTML = balls[i];
  }
  else{

    clearInterval(timer);

    countdown.style.opacity = "0";

    setTimeout(()=>{
      countdown.style.display = "none";
      document.getElementById("coverPage")
        .style.display = "flex";
    },1000);
  }

},1000);

document
.getElementById("readBtn")
.addEventListener("click",()=>{

  document.getElementById("coverPage")
    .style.display = "none";

  document.getElementById("newsPage")
    .style.display = "flex";

});

document
.getElementById("openBtn")
.addEventListener("click",()=>{

  document.getElementById("newsPage")
    .style.display = "none";

  document.getElementById("envelopePage")
    .style.display = "flex";

});

document
.getElementById("envelope")
.addEventListener("click",function(){

  this.classList.toggle("open");

});
</script>

</body>
</html>
