<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Chronicle</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  font-family:'Quicksand',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.newspaper{
  width:100%;
  max-width:700px;
  background:#efe5d3;
  border-radius:25px;
  padding:40px 30px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:52px;
  font-weight:700;
  color:#2c2c2c;
}

.edition{
  letter-spacing:8px;
  margin-top:10px;
  color:#444;
  font-size:15px;
}

.date{
  margin:35px 0;
  font-size:22px;
  color:#444;
}

.headline{
  font-family:'Cormorant Garamond',serif;
  font-size:45px;
  color:#222;
  margin-bottom:25px;
}

.cover-photo{
  width:100%;
  border-radius:18px;
  margin-bottom:25px;
}

.text{
  font-size:18px;
  line-height:1.8;
  color:#444;
}

button{
  margin-top:40px;
  border:none;
  background:#1f1f1f;
  color:white;
  padding:18px 40px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
}

@media(max-width:600px){

  .logo{
    font-size:42px;
  }

  .headline{
    font-size:34px;
  }

  .date{
    font-size:18px;
  }

}
</style>
</head>

<body>

<div class="newspaper">

  <div class="logo">
    THE DAILY CHRONICLE
  </div>

  <div class="edition">
    SPECIAL EDITION
  </div>

  <div class="date">
    31 JULY 2026
  </div>

  <div class="headline">
    THE MAN OF THE DAY
  </div>

  <img src="cover.jpg" class="cover-photo">

  <div class="text">
    Today we celebrate someone special.
    Another year of life, another chapter,
    and another reason to smile.
    <br><br>
    This special edition is dedicated to
    Dhicky 🖤
  </div>

  <button onclick="nextPage()">
    📰 Read Today's Story
  </button>

</div>

<script>
function nextPage(){
  alert("Halaman artikel dan scrapbook nanti kita sambungkan di tahap berikutnya ✨");
}
</script>

</body>
</html>
